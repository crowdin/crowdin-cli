# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.10.0.schema.json

# First v5 submission to microsoft/winget-pkgs (version + sha256 filled in on submit).
# The existing winget-pkgs manifests are v4 and carry a Java dependency, so the first v5
# publish must submit these; automated bumps take over after.
#
# Portable install of the standalone win32-x64 binary: winget symlinks it onto PATH as
# `crowdin` (Commands), no installer needed.

PackageIdentifier: Crowdin.CrowdinCLI
PackageVersion: 5.0.0
# Bun-compiled binaries require Windows 10 1809+
MinimumOSVersion: 10.0.17763.0
InstallerType: portable
Commands:
  - crowdin
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/crowdin/crowdin-cli/releases/download/5.0.0/crowdin.exe
    InstallerSha256: __CHECKSUM__
ManifestType: installer
ManifestVersion: 1.10.0
