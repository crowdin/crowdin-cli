name: Build and Test Next CLI

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bun run lint

      - name: Run tests
        run: bun run test

  build:
    name: Build binaries
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native binary (host target)
        run: bun run build

      - name: Build Linux binary
        run: bun run build-linux

      - name: Build Windows binary
        run: bun run build-windows

      - uses: actions/upload-artifact@v7
        with:
          name: next-cli-binaries
          path: dist/*
