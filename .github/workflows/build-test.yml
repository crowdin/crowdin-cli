name: Build and Test CLI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bun run lint

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info

  build:
    name: Build binaries
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all platform binaries
        run: bun run build:all

  windows-installer:
    name: Build Windows installer
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          # Baseline build, so the win32-x64-baseline compile target matches the host and bun doesn't download the target executable - that download is broken on Windows hosts (oven-sh/bun#28327)
          bun-download-url: https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64-baseline.zip

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        uses: ./.github/actions/read-version

      - name: Build binary
        run: bun run build:win32-x64

      - name: Smoke test binary
        run: packages\npm\win32-x64\bin\crowdin.exe --version

      - name: Compile .ISS to .EXE Installer
        # Inno Setup is preinstalled on the windows runner image
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: iscc /DMyAppVersion=$env:VERSION packages\exe\CrowdinCLIInstaller.iss

      - uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: crowdin-installer.exe
