name: Build and Test

on:
  push:
    branches: [ '*' ]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
  pull_request:
    branches: [ 'main' ]

jobs:
  build:
    runs-on: [ ubuntu-latest ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Execute Gradle build
        run: ./gradlew build

      - name: Build executable jar file
        run: ./gradlew shadowJar

      - name: Generate autocomplete script
        run: |
          cd build/libs
          java -cp crowdin-cli-*.jar picocli.AutoComplete com.crowdin.cli.commands.picocli.RootCommand

      - uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: |
            build/libs/crowdin-cli-*.jar
            build/libs/crowdin_completion

  test:
    needs: build
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: 'gradle'

      - name: Run Tests
        run: ./gradlew test

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: ${{ (success() || failure()) && github.ref == 'refs/heads/main' }}
        with:
          name: Test results ${{ matrix.os }}
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Generate code coverage report
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew build jacocoTestReport

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  docs-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Docs
        run: bun run docs

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build Website
        working-directory: website
        run: npm run build

  test-ts:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Lint
        run: bun run lint

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        uses: ./.github/actions/read-version

      - name: Build binary
        run: bun run build:win32-x64

      - name: Smoke test binary
        run: packages\npm\win32-x64\bin\crowdin.exe --version

      - name: Compile .ISS to .EXE Installer
        # Inno Setup is preinstalled on the windows runner image
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: iscc /DMyAppVersion=$env:VERSION packages\exe\CrowdinCLIInstaller.iss

      - uses: actions/upload-artifact@v7
        with:
          name: exe-package
          path: crowdin-installer.exe
