name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        type: choice
        required: true
        default: 'all'
        options:
          - 'all'
          - 'npm'
          - 'aur'
          - 'homebrew'
          - 'chocolatey'
          - 'docker'
          - 'winget'
      winget_release_tag:
        description: 'Release tag for manual WinGet publish (example: 4.14.2)'
        type: string
        required: false

jobs:
  # v5 publishes npm + docker + chocolatey (as a prerelease) + the Windows exe installer.
  # The other package jobs are kept below but disabled (`if: false`) until adapted for v5 -
  # see the main branch for their v4 publishing.
  verify:
    # Publish from the release branch only
    if: github.ref == 'refs/heads/next' && contains(fromJSON('["all", "npm", "docker"]'), github.event.inputs.package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bunx biome check

      - name: Run tests
        run: bun run test

      - name: Build linux binary
        run: bun run build:linux-x64

      - name: Read version
        id: version
        uses: ./.github/actions/read-version

      - name: Smoke test binary version
        run: |
          version="${{ steps.version.outputs.version }}"
          out=$(./packages/npm/linux-x64/bin/crowdin --version)
          echo "manifest version: $version / binary version: $out"
          test "$out" = "$version"

  publish-platforms:
    needs: verify
    if: github.event.inputs.package == 'all' || github.event.inputs.package == 'npm'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - darwin-arm64
          - darwin-x64
          - linux-x64
          - linux-arm64
          - linux-x64-musl
          - linux-arm64-musl
          - win32-x64
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Update npm
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build:${{ matrix.package }}

      - name: Publish
        run: npm publish packages/npm/${{ matrix.package }}

  # Last: the launcher pins exact platform-package versions, so it must never be published before its binaries
  publish-cli:
    needs: publish-platforms
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Update npm
        run: npm install -g npm@11.18.0

      - name: Publish
        run: npm publish packages/npm/cli

  assets:
    # Builds the standalone binaries and creates the GitHub release (as a pre-release while v5 is in beta) once the npm packages are published
    needs: publish-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        uses: ./.github/actions/read-version

      - name: Build binaries
        run: bun run build:all

      - name: Stage release assets
        run: |
          mkdir release-assets
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 linux-x64-musl linux-arm64-musl; do
            cp packages/npm/$platform/bin/crowdin release-assets/crowdin-$platform
          done
          cp packages/npm/win32-x64/bin/crowdin.exe release-assets/crowdin-win32-x64.exe
          cd release-assets
          shasum -a 256 crowdin-* > crowdin-cli_checksums.sha256
          echo ${{ steps.version.outputs.version }} > version.txt

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          files: release-assets/*

  aur:
    runs-on: ubuntu-latest
    if: false # disabled until adapted for v5
    needs: assets
    steps:
      - uses: actions/checkout@v6

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: crowdin-cli
          pkgbuild: ./packages/aur/pkgbuild/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update AUR package
          ssh_keyscan_types: rsa,ecdsa,ed25519

  homebrew:
    # Bumps the crowdin@5 formula in the crowdin/homebrew-crowdin tap. Disabled for now; to enable, replace `if: false`
    # with the same wiring as chocolatey:
    #   if: >-
    #     ${{ !cancelled() && github.ref == 'refs/heads/next' &&
    #         (github.event.inputs.package == 'homebrew' ||
    #          (github.event.inputs.package == 'all' && needs.assets.result == 'success')) }}
    runs-on: ubuntu-latest
    needs: assets
    if: false # disabled until the crowdin@5 formula is published to the tap
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        uses: ./.github/actions/read-version

      - name: Invoke workflow in the homebrew-crowdin repo
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: publish-v5.yml
          repo: crowdin/homebrew-crowdin
          ref: refs/heads/master
          token: ${{ secrets.GH_HOMEBREW_TOKEN }}
          inputs: '{ "version": "${{ steps.version.outputs.version }}" }'

  chocolatey:
    # Publishes the v5 prerelease (`choco install crowdin-cli --pre`) to the Chocolatey
    # community repo. Runs as part of an `all` publish once the assets job has created the
    # GitHub release, or standalone (`package: chocolatey`) against the already-existing
    # release for the current version - so a failed npm publish never blocks a Chocolatey
    # retry (`!cancelled()` keeps this job alive when the skipped npm chain skips `assets`).
    runs-on: windows-latest
    needs: assets
    if: >-
      ${{ !cancelled() && github.ref == 'refs/heads/next' &&
          (github.event.inputs.package == 'chocolatey' ||
           (github.event.inputs.package == 'all' && needs.assets.result == 'success')) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        uses: ./.github/actions/read-version

      - name: Download release binary
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release download "$env:VERSION" --pattern crowdin-win32-x64.exe --dir release-assets

      - name: Inject checksum
        # The nuspec version and download URL are committed (bumped on release, manually for
        # now - see release.config.js); only the checksum of the freshly-released binary is
        # injected at pack time. The version check fails fast on a missed manual bump.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $nuspecVersion = ([xml](Get-Content packages/chocolatey/crowdin-cli.nuspec)).package.metadata.version
          if ($nuspecVersion -ne $env:VERSION) { throw "nuspec version ($nuspecVersion) does not match packages/npm/cli version ($env:VERSION)" }
          $checksum = (Get-FileHash release-assets/crowdin-win32-x64.exe -Algorithm SHA256).Hash.ToLower()
          $install = 'packages/chocolatey/tools/chocolateyinstall.ps1'
          (Get-Content $install) -replace '__CHECKSUM__', $checksum | Set-Content $install
          Get-Content $install

      - name: Choco pack
        uses: crazy-max/ghaction-chocolatey@v4
        with:
          args: pack packages/chocolatey/crowdin-cli.nuspec --outputdirectory packages/chocolatey

      - name: Smoke test package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          choco install crowdin-cli --source "$PWD\packages\chocolatey" --prerelease -y
          $out = crowdin --version
          Write-Host "package version: $env:VERSION / binary version: $out"
          if ("$out" -ne $env:VERSION) { exit 1 }

      - name: Choco push
        uses: crazy-max/ghaction-chocolatey@v4
        with:
          args: push packages/chocolatey/crowdin-cli.${{ steps.version.outputs.version }}.nupkg --api-key ${{ secrets.CHOCOLATEY_API_KEY }} --source=https://push.chocolatey.org/

  docker:
    # Builds the standalone binaries and pushes the multi-arch image to Docker Hub as
    # `next` + the exact version. `latest` stays with the stable (v4) releases.
    needs: verify
    if: github.event.inputs.package == 'all' || github.event.inputs.package == 'docker'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        uses: ./.github/actions/read-version

      - name: Build binaries
        run: |
          bun run build:linux-x64-musl
          bun run build:linux-arm64-musl

      - name: Stage Docker context
        run: |
          mkdir -p binaries/amd64 binaries/arm64
          cp packages/npm/linux-x64-musl/bin/crowdin binaries/amd64/crowdin
          cp packages/npm/linux-arm64-musl/bin/crowdin binaries/arm64/crowdin
          cp packages/docker/Dockerfile Dockerfile

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          context: .
          tags: |
            "${{ secrets.DOCKER_HUB_REGISTRY_IMAGE }}:next"
            "${{ secrets.DOCKER_HUB_REGISTRY_IMAGE }}:${{ steps.version.outputs.version }}"

  winget:
    # Runs automatically after the exe job has built and uploaded the installer.
    runs-on: windows-latest
    if: false # disabled until adapted for v5
    needs: exe
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Crowdin.CrowdinCLI
          installers-regex: '^crowdin-installer\.exe$'
          token: ${{ secrets.GH_WINGET_TOKEN }}
          fork-user: crowdin-bot

  winget-manual:
    # Runs on manual dispatch only. No exe build - the action picks up the .exe
    # from the latest existing GitHub release, so the release must already exist.
    runs-on: windows-latest
    if: false # disabled until adapted for v5
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Crowdin.CrowdinCLI
          installers-regex: '^crowdin-installer\.exe$'
          release-tag: ${{ github.event.inputs.winget_release_tag }}
          token: ${{ secrets.GH_WINGET_TOKEN }}
          fork-user: crowdin-bot

  exe:
    # Builds the Windows installer (Inno Setup) around the standalone win32-x64
    # binary and attaches it to the GitHub release created by the assets job
    runs-on: windows-latest
    needs: assets
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          # Baseline build, so the win32-x64-baseline compile target matches the host
          # and bun doesn't download the target executable - that download is broken
          # on Windows hosts (oven-sh/bun#28327)
          bun-download-url: https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64-baseline.zip

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        uses: ./.github/actions/read-version

      - name: Build binary
        run: bun run build:win32-x64

      - name: Smoke test binary
        run: packages\npm\win32-x64\bin\crowdin.exe --version

      - name: Compile .ISS to .EXE Installer
        # Inno Setup is preinstalled on the windows runner image
        run: iscc /DMyAppVersion=${{ steps.version.outputs.version }} packages\exe\CrowdinCLIInstaller.iss

      - name: Upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: crowdin-installer.exe
