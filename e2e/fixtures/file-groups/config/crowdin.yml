project_id: "{{projectId}}"
api_token: "{{token}}"

base_path: "."
base_url: "https://api.crowdin.com"
preserve_hierarchy: true

# Ported from crowdin-backend/tests/var/Cli/Common/CliFileGroupsTest/config/crowdin.yml. The PHP
# fixture lists '/sources/*.pot' FIRST (it never matches anything, on purpose). Here it is placed
# LAST instead: UploadSourcesCommand.ts throws a CliError the instant any group matches zero files,
# aborting the whole command immediately (PHP only warns and keeps going), so putting the always-
# empty pattern first would abort before 'sources/java.properties' or 'sources/android.xml' -- the
# two overlapping groups this fixture exists to exercise -- ever uploaded. Moving it last preserves
# both behaviors under test: the overlap between '*.xml' and the explicit 'android.xml' below, and
# the "no sources found" pattern -- just with the empty group observed after the real uploads.
files:
  - source: "/sources/*.properties"
    translation: "/translations/%two_letters_code%/%original_file_name%"
  - source: "/sources/*.xml"
    translation: "/translations/%two_letters_code%/%original_file_name%"
  - source: "/sources/android.xml"
    translation: "/translations/%two_letters_code%/%original_file_name%"
  - source: "/sources/*.pot"
    translation: "/translations/%two_letters_code%/%original_file_name%"
