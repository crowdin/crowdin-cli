project_id: "{{projectId}}"
api_token: "{{token}}"
base_path: "."
base_url: "https://api.crowdin.com"
preserve_hierarchy: true

# Only exercised by the one test that runs `upload sources` with no `-s`/`-t` override (the
# "empty files" scenario) -- every other test passes `-s`/`-t` on the command line, which fully
# replaces this `files:` entry via `cli/config.ts`'s `cliLayer()` (see the suite file's top comment).
files:
  - source: "/sources/*.xml"
    translation: "/translations/%two_letters_code%/%original_file_name%"
