project_id: "{{projectId}}"
api_token: "{{token}}"
base_path: "."
base_url: "https://api.crowdin.com"
preserve_hierarchy: true

files:
  - source: "/android.xml"
    translation: "/android_%locale_with_underscore%.xml"
    dest: "/Android.xml"
  - source: "/folder/android_en_US.xml"
    translation: "/folder/android_%locale_with_underscore%.xml"
    dest: "/Folder/Android.xml"
  - source: "/folder/client_en_US.xml"
    translation: "/folder/client_%locale_with_underscore%.xml"
    dest: "Folder/Client.xml"
  - source: "/destCheckFolder/android.xml"
    translation: "/destCheckFolder/android_%locale_with_underscore%.xml"
    dest: "/Test-%original_path%/%file_extension%/%file_name%/%original_file_name%"
  - source: "/destCheckFolderParallelFileProcess/android.xml"
    translation: "/destCheckFolderParallelFileProcess/android_%locale_with_underscore%.xml"
    dest: "/Test-%original_path%/%file_extension%/%original_file_name%"
  - source: "/destCheckFolderParallelFileProcess/second_android.xml"
    translation: "/destCheckFolderParallelFileProcess/second_android_%locale_with_underscore%.xml"
    dest: "/Test-%original_path%/%file_extension%/%original_file_name%"
