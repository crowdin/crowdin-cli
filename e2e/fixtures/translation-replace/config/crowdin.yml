project_id: "{{projectId}}"
api_token: "{{token}}"
base_path: "./files"
base_url: "https://api.crowdin.com"
preserve_hierarchy: true
files:
  # NOTE: the PHP original this suite is ported from
  # (crowdin-backend/tests/Cli/Common/CliTranslationReplaceTest.php, fixture at
  # tests/var/Cli/Common/CliTranslationReplaceTest/config/crowdin.yml) uses:
  #   translation: "/%two_letters_code%/%original_path%/%original_file_name%"
  #   translation_replace: { "/en": "" }
  # Java's "%original_path%" is the file's full relative dirname INCLUDING the source
  # pattern's fixed "en/" prefix (but excluding the filename) - e.g. "en/src/main/resources"
  # for "en/src/main/resources/android.xml" - which is why the PHP config needs
  # "translation_replace" to strip that "en/" prefix back out and land on
  # "it/src/main/resources/android.xml".
  #
  # That combination is deliberately NOT reproduced literally here. Confirmed via a
  # throwaway offline script calling TranslationPathResolver.resolve directly (no token
  # needed): this codebase's "%original_path%" (src-next/lib/config/translationPathResolver.ts,
  # the `originalPath` branch of getValueForExportPattern) resolves to the FULL matched
  # source path INCLUDING THE FILENAME - e.g. "en/src/main/resources/android.xml" - not just
  # the containing directory. With the literal PHP pattern that resolves to
  # "/it/en/src/main/resources/android.xml/android.xml" (filename doubled as a fake
  # directory), which matches no real local file and would make every "upload
  # translations"/"download translations" step warn "does not exist" - this is the same,
  # already-tracked "Bug 7" documented for ../file-tree/config/crowdin.yml and in this
  # porting effort's crowdin-cli-known-bugs memory, and would swamp this suite's actual
  # subject (re-upload/re-translate behavior) with an unrelated bug.
  #
  # This "**"-based pattern was confirmed (same offline script) to resolve to the exact
  # paths the PHP test expects ("it/src/main/resources/android.xml",
  # "it/src/main/resources/org/crowdin/android.xml", etc.) without touching the buggy
  # placeholder. Because "**" only ever captures the wildcard-matched portion of the source
  # pattern - never its fixed "en/" prefix - there is nothing left for "translation_replace"
  # to strip here, so it is dropped entirely rather than kept as a no-op.
  - source: "/en/**/*.xml"
    translation: "/%two_letters_code%/**/%original_file_name%"
