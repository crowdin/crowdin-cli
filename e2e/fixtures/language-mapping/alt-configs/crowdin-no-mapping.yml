project_id: "{{projectId}}"
api_token: "{{token}}"

base_path: "."
base_url: "https://api.crowdin.com"
preserve_hierarchy: true

files:
  - source: "/android_code/android.xml"
    translation: "/android_code/%android_code%/%original_file_name%"
  - source: "/language/android.xml"
    translation: "/language/%language%/%file_name%.%file_extension%"
  - source: "/locale/android.xml"
    translation: "/locale/%locale%/android.xml"
  - source: "/locale_with_underscore/android.xml"
    translation: "/locale_with_underscore/%locale_with_underscore%/android.xml"
  - source: "/osx_code/android.xml"
    translation: "/osx_code/%osx_code%/android.xml"
  - source: "/osx_locale/android.xml"
    translation: "/osx_locale/%osx_locale%/android.xml"
  - source: "/three_letters_code/android.xml"
    translation: "/three_letters_code/%three_letters_code%/android.xml"
  - source: "/two_letters_code/android.xml"
    translation: "/two_letters_code/%two_letters_code%/android.xml"
