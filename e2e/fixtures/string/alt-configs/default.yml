# Identical to config/crowdin.yml - used to restore the full (token + project id + two file
# entries) configuration after the `without-token.yml` test switches to a config that lacks
# `api_token`/`project_id`, mirroring the PHP original's `self::prepareConfig()` reset call.
project_id: "{{projectId}}"
api_token: "{{token}}"
base_path: "."
base_url: "https://api.crowdin.com"
preserve_hierarchy: false
files:
  - source: "/sources/android.xml"
    translation: "/translations/%two_letters_code%/%original_file_name%"
  - source: "/sources/text.txt"
    translation: "/translations/%two_letters_code%/%original_file_name%"
