project_id: "{{projectId}}"
api_token: "{{token}}"
base_path: "./files"
base_url: "https://api.crowdin.com"
preserve_hierarchy: true
files:
  - source: "/php/**/Bundle.properties"
    # NOTE: the PHP original this suite is ported from uses
    # "/%two_letters_code%/%original_path%/Bundle.properties" here. That is deliberately NOT
    # reproduced literally - see the top-of-suite comment in ../../../suites/file-tree.test.ts for
    # why (crowdin-cli-known-bugs.md Bug 7: %original_path% resolves to the full path including the
    # filename, not just the containing directory, unlike the old Java/PHP CLI). This "**"-based
    # pattern lands on the exact same local paths (e.g. "uk/php/hudson.php/.../Bundle.properties")
    # without depending on the buggy placeholder.
    translation: "/%two_letters_code%/php/**/Bundle.properties"
